name: Release

# R3-01/R3-02: on every version tag, build the npm tarball once, publish it as
# an immutable GitHub release asset together with its SHA-256, so install.sh
# can pin the tag and verify the archive BEFORE executing anything from it.
# Actions are SHA-pinned (drift gate: no mutable uses: refs).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - name: Assert tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VER="$(node -p 'require("./package.json").version')"
          test "$TAG" = "v$VER" || { echo "tag $TAG != package version v$VER"; exit 1; }
      - run: npm test
      - name: Build asset + checksum
        run: |
          VER="$(node -p 'require("./package.json").version')"
          npm pack
          mv "sdsrs-agentsmd-$VER.tgz" "agentsmd-$VER.tgz"
          sha256sum "agentsmd-$VER.tgz" > "agentsmd-$VER.tgz.sha256"
          cat "agentsmd-$VER.tgz.sha256"
      - name: Create release with assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="$(node -p 'require("./package.json").version')"
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --title "agentsmd ${GITHUB_REF_NAME}" \
            --notes "See CHANGELOG.md. Asset \`agentsmd-$VER.tgz\` is the npm tarball; verify with \`agentsmd-$VER.tgz.sha256\` (install.sh does this automatically)." \
            "agentsmd-$VER.tgz" "agentsmd-$VER.tgz.sha256"
